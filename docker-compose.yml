version: '3.8'

services:
  db:
    image: postgres:15
    container_name: canchas_db
    environment:
      POSTGRES_USER: canchas
      POSTGRES_PASSWORD: canchas123
      POSTGRES_DB: canchas_reservas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canchas -d canchas_reservas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: canchas_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://canchas:canchas123@db:5432/canchas_reservas
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
